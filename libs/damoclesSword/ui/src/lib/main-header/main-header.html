@if (compReady()) {
  <div class="damoclesSword-header">
    <div class="first-header-section">
      <a [routerLink]="['./home']" class="logo-container">
        <lib-damoclesSword-logo-brand></lib-damoclesSword-logo-brand>
      </a>
      <div class="dropdown-icon">
        <div (click)="toggleNavMenu()" class="icon-container">
          <svg
            class="three-parallel-lines-icon"
            fill="none"
            height="24"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            viewBox="0 0 24 24"
            width="24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <line x1="3" x2="21" y1="12" y2="12"></line>
            <line x1="3" x2="21" y1="6" y2="6"></line>
            <line x1="3" x2="21" y1="18" y2="18"></line>
          </svg>
        </div>
      </div>
    </div>
    <div
      [ngClass]="{ 'show-nav-menu': showNavMenu() }"
      class="header-navigation-container"
    >
      <div class="position-helper">
        <div class="navigation-links">
          @for (navLink of navLinks(); track $index) {
            <a
              [routerLink]="navLink.url"
              [routerLinkActive]="['active-link']"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link"
              >{{ navLink.label | rokuT }}</a
            >
          }
        </div>
        <div class="header-language-container">
          <damoclesSword-language-selector
            (selectedLanguageChange)="languageChange.emit($event)"
            [languages]="languages()"
            [selectedLanguage]="selectedLanguage()"
          ></damoclesSword-language-selector>
        </div>
      </div>
    </div>
  </div>
}
